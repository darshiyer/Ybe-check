name: Static Smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  extension-build:
    name: Extension Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: A2K2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: A2K2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

  python-static-smoke:
    name: Python Static Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile scanner Python files
        run: |
          python - <<'PY'
          import compileall, sys
          ok = compileall.compile_dir('A2K2', force=True, quiet=1)
          if not ok:
              raise SystemExit(1)
          print('Python compile check passed')
          PY

      - name: Run static CLI smoke
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          cmd = [sys.executable, 'A2K2/cli.py', 'A2K2-test', '--json', '--static']
          proc = subprocess.run(cmd, capture_output=True, text=True, check=True)
          report = json.loads(proc.stdout)

          names = [m.get('name') for m in report.get('modules', [])]
          expected = {
            'Secrets Detection', 'Prompt Injection', 'PII & Logging', 'Dependencies',
            'Auth Guards', 'IaC Security', 'License Compliance',
            'AI Traceability', 'Config & Env', 'Test & Coverage'
          }
          if set(names) != expected:
              raise AssertionError(f'Unexpected static modules: {names}')

          dynamic_keywords = ('trivy', 'syft', 'ffuf', 'docker', 'artillery')
          for mod in report.get('modules', []):
              warning = (mod.get('warning') or '').lower()
              if any(k in warning for k in dynamic_keywords):
                  raise AssertionError(f'Dynamic warning leaked into static run: {warning}')

          print('Static CLI smoke passed')
          print('Overall score:', report.get('overall_score'))
          PY
